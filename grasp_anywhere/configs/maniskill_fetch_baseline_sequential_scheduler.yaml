robot:
  urdf_path: "resources/fetch_ext/fetch ext.urdf"
  costmap_path: None

environment:
  pcd_path: ""
  pcd_files: []
  ground_z_threshold: 0.1

planning:
  scheduler_type: "sequential" # Options: "default", "sequential"
  manipulation_radius: 0.8
  enable_replanning: True
  enable_icp_refinement: False
  enable_pcd_alignment: False
  dynamic_costmap: True
  capability_map_path: "resources/capability_map.pkl"
  reachability_map_path: "resources/reachability_map.pkl"
  torso_map_path: "resources/torso_map.pkl"

services:
  graspnet_url: "http://localhost:4003"
  owl_url: "http://localhost:4000"
  sam_url: "http://localhost:4001"

debug:
  enable_visualization: False
  enable_debug: False
  render_mode: "human"

# Monitoring / benchmark critics (simple thresholds)
# - hold is disabled when hold_seconds == 0.0
monitor:
  contact_force_threshold: 0.001
  hold_seconds: 2.0
  hold_slip_thresh_m: 0.05
  hold_contact_grace_s: 0.2

gaze:
  lookahead_window: 40
  decay_rate: 0.999
  velocity_weight: 1.0
  joint_priorities:
    base: 3.0
    torso: 2.0
    shoulder_lift: 1.3
    elbow: 1.1
    wrist_flex: 1.0
    gripper: 1.0

benchmark:
  enable_dynamic_challenges: False

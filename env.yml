name: mobile_grasping_in_dynamic
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.9.*=*cpython*
  - cmake=3.14.0
  # For servers or machines without a display, uncomment the next line:
  # - headless
  - scipy
  - matplotlib
  - h5py
  - scikit-learn
  - tqdm
  - pip
  - git
  - setuptools
  - wheel
  # PyTorch with CUDA 12.4 support
  - pytorch==2.4.1
  - torchvision==0.19.1
  - pytorch-cuda=12.4
  - pip:
    - -e .
